cell_types:
          # "re-spaces" для `pattern_syntax` означает, что в `pattern` содержится модифицированное регулярное выражение, которое будет предварительно обработано, заменяя все  одиночные пробелы на возможные пробелы (' '  ->  \s* или [ ]*), а двойные - на обязательные пробелы ('  '  ->  \s+).

          # "...+letters" для `pattern_syntax` означает, что в `pattern` содержится модифицированное регулярное выражение, которое будет предварительно обработано, заменяя все одиночные буквы в двойных квадратных скобках из списка на их условные эквиваленты (see: inject_letter_helpers):
        #  - \Я -- русские заглавные
        #  - \я -- русские строчные
        #  - \Б -- любые заглавные
        #  - \б -- любые строчные
        #  - \L -- любые буквы (здесь и везде выше: без цифр)

          # Перечень "preprocess: ..." при паттерне позволяет указать преобразования, которые будут произведены над текстовым значением ячейки перед проверкой (регулярным выражением). На момент написания доступны преобразования: 'fix_sparse_words', 'remove_all_spaces', 'remove_spaces_around_hypen' (подробнее см. класс StringPattern).
          # "update_content: ..."

          # anchors: ('start' and / or 'end' or 'both' or 'none') — добавляет якоря (^…$) к заданному паттерну регулярного выражения. По умолчанию всегда используется 'start'.

  - teacher:
      description: преподаватель

      # TODO:
      # `Коробейникова      В-602`

      patterns:
            # имя преподавателя может содержать префикс должности, обязательно фамилию (с допустимым дефисом в середине) а также опциональные инициалы
        - confidence: 1.00
          pattern: '(?:доц|проф|асс[истент]*|ст\. пр\w* |пр[еподаватель]*|[кд]\.\я{1,6}\.н)[.\s] \я+'
          pattern_syntax: re-spaces+letters
          pattern_flags: I

        - confidence: 0.95
            # Фамилия И.О.
          pattern: '\Я[а-яё-]+  \Я\.? \Я\.? (?:$|,)'
          pattern_syntax: re-spaces+letters

        - confidence: 0.93
          pattern: '(?:науч[ные.й]* )?рук[оводители.ь]*|'
          pattern_syntax: re-spaces
          anchors: both
          pattern_flags: I

        - confidence: 0.92
            # Фамилия Имя
          pattern: '\Я\я+ \Я[а-яё-]?\.?  \Я\я*\.? (?:$|,)'
          pattern_syntax: re-spaces+letters

        - confidence: 0.90
            # Фамилия И.
          pattern: '\Я[а-яё-]+ \Я?\.? \Я\. (?:$|,)'
          pattern_syntax: re-spaces+letters

        - confidence: 0.85
            # просто буква 'Х' , типа "вакансия"
          pattern: '[ХX]'
          anchors: both
          pattern_syntax: re

        - confidence: 0.80
            # Фамилия
            # Фамилия(1)
            # Фамилия(<язык>)
            # `Рыжова(1)`
            # `Чечет(нем)`
          pattern: '\Я\я+(\-\Я?\я+)* (?:\((?:\d|(?:нем|англ|фр[анц]*)\.?)\))? (?:,|$)'
          pattern_syntax: re-spaces+letters

        - confidence: 0.60
            # Содержится слово (Фамилия) с Большой буквы
          pattern: '\Я\я+'
          pattern_syntax: re+letters
          anchors: none
          pattern_flags: 0

        - confidence: 0.20
            # Слово с любой буквы
          pattern: '\L+'
          pattern_syntax: re+letters

        - confidence: 0.05
            # Любые символы (Например, "???")
          pattern: '.+'
          pattern_syntax: re

  - room:
      description: аудитория
      patterns:
            # аудитория может иметь префикс корпуса, либо быть тренажёрным залом, либо быть названием фирмы в кавычках
        - confidence: 1.00
            # Аудитории с префиксом корпуса: ГУК, А, Б, В, ЛК, Т + 3+ цифры
            # Исключаем группы (буквы + дефис/пробел + цифры), если это не префикс корпуса
            # Примеры: А-301, Б-405, В-610, ЛК-303, Т-205 (это аудитории)
          pattern: '(?:ГУК|А|Б|В|ЛК|Т|общ\.?|(?:высотка)? каб\.) -?-? \d{3,}(?:-\d+| [а-я])?(?:[,]|$| ).*'
          pattern_syntax: re-spaces
          pattern_flags: I
          preprocess: remove_spaces_around_hypen

          # фитнес-зал кор. «В»
          # ГУК, Спортивный зал
        - confidence: 1.00
          pattern: '\bзал\b'
          pattern_syntax: re
          pattern_flags: I
          anchors: none
          preprocess: remove_spaces_around_hypen

        - confidence: 0.99
          pattern: '\bкаф.|кафедра|\bБК|ВКФ|КЦУНЦ'
          pattern_syntax: re  #-spaces
          # pattern_flags: I
          anchors: none
          preprocess: remove_spaces_around_hypen

        - confidence: 0.96
            # ООО,,Лукойлинжиниринг,,
            # ,,ПермНИПИнефть,,
            # `,,` как импровизированные кавычки для названий фирм с БК ("базовой кафедрой").
          pattern: ',,.+,,'
          pattern_syntax: re
          # pattern_flags: I
          anchors: none
          preprocess: remove_spaces_around_hypen

        - confidence: 0.95
          pattern: ' дист[анционно.]*'
          pattern_syntax: re-spaces
          pattern_flags: I

        - confidence: 0.80
            # 3+ цифры (но НЕ группы - группы имеют формат буквы + дефис/пробел + цифры)
            # Исключаем форматы групп: буквы + дефис/пробел + цифры
          pattern: '(?![А-ЯЁ]{1,4}[-\s]+\d)(?:\d{3,}(?:-\d+|[а-я])* [,]? )+'
          pattern_syntax: re-spaces
          pattern_flags: I

        - confidence: 0.75
            # 2+ цифры + буква (но НЕ группы)
          pattern: '(?![А-ЯЁ]{1,4}[-\s]+\d)(?:\d{2,}-*[а-я\d]+ [,]? )+'
          pattern_syntax: re-spaces
          pattern_flags: I

        - confidence: 0.30
            # слово и 3+ цифры (но НЕ группы)
            # Исключаем форматы групп: 1-4 русские буквы + дефис/пробел + цифры
          pattern: '(?![А-ЯЁ]{1,4}[-\s]+\d)(?:\S{1,10} \d{3,}(?:-\d+|[а-я])* [,]? )+'
          pattern_syntax: re-spaces
          pattern_flags: I

#        - confidence: 0.20
#            # аудитория может иметь префикс корпуса, либо быть тренажёрным залом, либо быть названием фирмы в кавычках
#          pattern: '(?:(?:(?:ГУК|А|Б|В|ЛК|Т|(?:высотка)? каб\.)? -? \d+(-\d+|[а-я])?|\".+\"|.* зал .*)?[,]?)+'
#          pattern_syntax: re-spaces
#          pattern_flags: I

        - confidence: 0.10
            # Любые символы (Например, "???")
          pattern: '.+'
          pattern_syntax: re

  - discipline:  # Название предмета
      description: дисциплина
      update_content: replace_with_preprocessed
      patterns:
        - confidence: 0.98
            # Только заглавные буквы (2-20 символов), без дефисов/цифр - приоритетный паттерн для коротких аббревиатур
            # Это короткие аббревиатуры дисциплин типа ТРОС, ПГВС, ОДВОП, БЖД
            # Исключаем дни недели, группы (дефис/пробел + цифры) и префиксы корпусов
            # Группы имеют дефис/пробел + цифры, дисциплины - НЕТ
          pattern: '(?!ПОНЕДЕЛЬНИК|ВТОРНИК|СРЕДА|ЧЕТВЕРГ|ПЯТНИЦА|СУББОТА|БК|КЦУНЦ|,,)(?!^(?:А|Б|В|Т|ЛК|ГУК)[-\s]+[\d])(?!^[А-ЯЁ]{1,4}[-\s]+[\d])[А-ЯЁA-Z]{2,20}'
          pattern_syntax: re
          anchors: both
          preprocess: fix_sparse_words

        - confidence: 1.00
            # Заглавные буквы с разделителями - хотя бы два слова.
            # Исключаем дни недели, группы (дефис/пробел + цифры после префикса) и префиксы корпусов
            # Группы имеют формат: буквы + дефис/пробел + цифры. Дисциплины - НЕТ таких паттернов.
          pattern: '(?!ПОНЕДЕЛЬНИК|ВТОРНИК|СРЕДА|ЧЕТВЕРГ|ПЯТНИЦА|СУББОТА|БК|КЦУНЦ|,,)(?!^(?:А|Б|В|Т|ЛК|ГУК)[\s-]+[\d]{3,})(?!^[А-ЯЁ]{1,4}[-\s]+[\d])(?:[А-ЯЁA-Z]{2,}[\s.,()/:-]+[А-ЯЁA-Z\d.,()/:\s-]{1,})'
          pattern_syntax: re
          anchors: both
          preprocess: fix_sparse_words

        - confidence: 0.97
            # Встречаются слова 2D / 3D / 1С
          pattern: '(?:2D|3D|1[СC])'
          pattern_syntax: re
          anchors: none
          preprocess: fix_sparse_words

        - confidence: 0.95
            # Заглавные буквы с разделителями, но НЕ группы (без дефиса/пробела+цифры)
            # Группы имеют дефис/пробел + цифры, поэтому исключаем такие паттерны
          pattern: '(?!.*\b(зал|БК|ВКФ|КЦУНЦ|,,|каф|кафедра)\b|.*,,)(?!^[А-ЯЁ]{1,4}[-\s]+[\d]|.*,,)(?:[А-ЯЁA-Z.,()\s/:-]{2,}[\d.,-]{,3})'
          pattern_syntax: re
          anchors: both
          preprocess: fix_sparse_words

        - confidence: 0.90
            # Заглавные буквы с разделителями, минимум 5 букв
            # отрицания: см. ниже (0.75)
          pattern: '(?!.*\b(зал|БК|ВКФ|КЦУНЦ|,,|каф|кафедра)\b|.*,,)(?:[А-ЯЁA-Z.,()/:-]{5,}[\s\d.,-]{,3})+'
          pattern_syntax: re
          anchors: none
          preprocess: fix_sparse_words

        - confidence: 0.75
            # Заглавные буквы с разделителями
            # Не: (спортивный) зал, БК
            # Не: `,,` как импровизированные кавычки для названий фирм с БК ("базовой кафедрой").
          pattern: '(?!.*\b(зал|БК|ВКФ|КЦУНЦ|,,|каф|кафедра)\b|.*,,)[А-ЯЁA-Z.,()\s/:-]{2,}[А-ЯЁA-Zа-яёa-z.,()\s/:-]+'
          pattern_syntax: re
          anchors: both
          preprocess: fix_sparse_words

        - confidence: 0.55
            # все маленькие буквы с разделителями
            # Не: (спортивный) зал, БК и др.
          pattern: '(?!.*\b(зал|БК|каф|кафедра|лаб|руководител\w*)\b|(?:доц|проф|асс[истент]*|ст\. пр\w* |пр[еподаватель]*|[кд]\.\я{1,6}\.н)|.*,,)[а-яёa-z.,()\s/:-]{2,}[А-ЯЁA-Zа-яёa-z.,()\s/:-]+'
          pattern_syntax: re
          anchors: both
          preprocess: fix_sparse_words

#        - confidence: 0.93
#            # Разреженные пробелами слова: 'М А Т Е М А Т И К А', 'И   С   Т   О   Р   И   Я            Р   О   С   С   И   И'
#          # pattern: '(?:\b[А-ЯЁA-Z-][.]?(?:\s+|$)){5,}'
#          pattern: '[А-ЯЁA-Z.() -]{2,}'  # такой же, как для 0.90
#          pattern_syntax: re
#          preprocess: fix_sparse_words

        - confidence: 0.30
            # хотя бы две заглавные буквы подряд
          pattern: '[А-ЯЁA-Z]{2,}'
          anchors: none
          pattern_syntax: re
          preprocess: fix_sparse_words

        - confidence: 0.05
            # Любые символы (Например, "???")
          pattern: '.+'
          pattern_syntax: re

  # - group_list:
