          # `лекц. 6 час.`
          # `лекция 6 часа`
          # `лаб. 6 час.`
          # `пр.` , `лаб.`
          pattern: '(?:лек[ция]*|пр[актика]*|лаб[ораторная. работа]*)\.? (?:6 час[ов.а]{0,2})'
          pattern_syntax: re-spaces
          anchors: both
          pattern_flags: I

        - confidence: 1.00
          # `6 час.`
          pattern: '6 час[.аов]{0,2}'
          pattern_syntax: re-spaces
