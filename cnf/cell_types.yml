  - group:
      description: учебная группа
      patterns:
        - confidence: 1.00
            # Группы: буквы + дефис/пробел + цифры (обязательно!)
            # Одно-буквенные группы: ТОЛЬКО И, М, Ф, Э (не префиксы корпусов А, Б, В, Т!)
            # Много-буквенные: 2-4 русские заглавные (возможно со строчными) + дефис/пробел + цифры
            # remove_spaces_around_hypen убирает пробелы ВОКРУГ ДЕФИСА: "ИВТ - 360" → "ИВТ-360"
            # НЕ преобразует строки без дефиса: "ИВТ 360" остаётся "ИВТ 360"
            # Исключаем односимвольные префиксы корпусов (А, Б, В, Т, ЛК, ГУК) с пробелом + цифры
            # Многосимвольные группы могут начинаться с этих букв: АТ-114, АРХ-1-20, ВЭЗ-390 и т.д.
            # Примеры: ИВТ-360, ПрИн-166, МиР-322, ВЭЗ-390, ВХЭ-256, АТ-114, АРХ-1-20
            # Группы ВСЕГДА имеют дефис/пробел + цифры (в отличие от дисциплин)
            # В реальных данных дефис может быть заменён пробелом
          pattern: '(?!(?:^[АБВТЛК] [\d])|(?:^ГУК [\d]))(?:[ИМФЭ]|[А-ЯЁ]{2,4}[А-ЯЁа-яё]*)[-\s]+[\d.-]+[^,]*'
          pattern_syntax: re
          anchors: both
          preprocess: remove_spaces_around_hypen

        - confidence: 0.85
            # Группы: буквы (включая смешанный регистр) + дефис + цифры
            # После remove_all_spaces пробелы удалены, дефис остается
            # Исключаем префиксы корпусов с 3+ цифрами
          pattern: '(?!(?:^[АБВТ]-[\d]{3,})|(?:^ЛК-[\d]{3,})|(?:^ГУК-[\d]{3,}))(?:[А-ЯЁA-Zа-яёa-z]{2,}[А-ЯЁA-Zа-яёa-z.]*)-[\d.-]+[^,]*'
          pattern_syntax: re
          anchors: both
          preprocess: remove_all_spaces

        - confidence: 0.05
            # Любые символы (Например, "???")
          pattern: '.+'
          pattern_syntax: re


  - subgroup:
      description: подгруппа
      patterns:
