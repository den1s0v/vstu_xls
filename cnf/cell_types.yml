        - confidence: 0.97
            # сокращённые названия
          pattern: '(?:янв[арь]*|фев[раль]*|март?|апр[ель]*|май|июнь?|сен[тябрь]*|окт[ябрь]*|ноя[брь]*|дек[абрь]*)\.?'
          pattern_syntax: re
          anchors: both
          pattern_flags: I

  - hour_range:
      description: академ.часы
      patterns:
        - confidence: 1.00
          # `1- 2`, '1-2', '15-16'
          pattern: '1?\d - 1?\d'
          pattern_syntax: re-spaces
