  frame_based_lesson:
    description: занятие любой формы
    kind: area
    allows_overlapping: true
    size: '2+ x 3..9'
    extends: lesson

    inner:  # содержимое
      frame:
        pattern: lesson_frame
        location:
          - top  # упаковано полностью
          - left
          - right
          - bottom

      teacher:
        pattern: teacher_burst
      room:
        pattern: room_burst
