# lesson_frames.yml

patterns:
  # На этом уровне перечисляются паттерны грамматики.


  lesson_frame:
    description: обощённая обёртка над местом, в котором размещается занятие
    kind: general


  lesson_frame_1_group_2h__hor_layout:
    description: занятие на одну группу и на 1 пару (2 ак. часа), горизонтальное расположение (как ИН. ЯЗ.)
    kind: area
    allows_overlapping: true
    extends: lesson_frame
    static_data:
      subgroup: null  # больше не применимо, сбрасываем

    inner:  # содержимое
      discipline:
        size: '1 x 3'
        pattern: discipline_with_groups_lab_left
        location:
          - top  # упаковано: влево + верх и низ
          - left
          - right: 1..4
          - bottom

      # проверка наличия:
      teacher:
        pattern: teacher_general
        location:
          left: 1+
      room:
        pattern: room_general
        location:
          left: 1+

    outer:
      hour_begin:  # для занятий длиной в 1 пару
        pattern: hour_range
        location:
          margin-left: 0+  # академ. часы указаны слева
          padding-top: 0
          padding-bottom: 0

      first_group:
        pattern: group_in_header
        location:
          - margin-top: 0+  # упаковано и слева, и справа
          - padding-left: 0
          - padding-right: 0



  lesson_frame_1_group_2h_explicitly:
    description: занятие на одну группу и на 1 пару (2 ак. часа)
    kind: area
    allows_overlapping: true
    extends: lesson_frame

    inner:  # содержимое
