          - top  # упаковано: влево + верх и низ
          - left   ###: 0..2
          - right   ###: 0..2
          - bottom: 1..3

      _explicit_lesson_kind:
        pattern: lesson_kind_2h

      # проверка наличия:
      teacher:
        pattern: teacher_general
        location:
          top: 1+
      room:
        pattern: room_general
        location:
          top: 1+

    outer:
      hour_begin:  # для занятий длиной в 1 пару
        pattern: hour_range
        location:
          margin-left: 0+  # академ. часы указаны слева
          padding-top: 0
          padding-bottom: 0

