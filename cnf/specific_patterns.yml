# specific_patterns.yml

patterns:
  # На этом уровне перечисляются паттерны грамматики.


  room_general:
    description: аудитории в любом формате
    kind: general

  teacher_general:
    description: преподаватели в любом формате
    kind: general



  room_stack:
    description: аудитории в столбик/в ряд
    kind: array
    direction: column
    item_pattern: room
    item_count: 2..3
    extends:
      - room_general

  teacher_stack:
    description: преподаватели в столбик/в ряд
    kind: array
    direction: column
    item_pattern: teacher
    item_count: 2..3
    extends:
      - teacher_general

  teacher_stack_3_unaligned:
    description: 3 преподавателя в столбик, правая граница не выровнена
    kind: area
    allows_overlapping: true
    size: '1..3 x 3'
    inner:  # содержимое
      t1:
        pattern: teacher
        precision_threshold: 0.5
        location: {
          top: 0, bottom: 2,
          left: 0, right: '0..1' }
      t2:
        pattern: teacher
        precision_threshold: 0.5
        location: {
          top: 1, bottom: 1,
          left: 0, right: '0..1' }
      t3:
        pattern: teacher
        precision_threshold: 0.5
        location: {
          top: 2, bottom: 0,
          left: 0, right: '0..1' }
    extends:
      - teacher_stack






  explicit_dates:
    kind: cell
    description: переопределённые даты
    content_type: explicit_dates
    size: 2+ x 1

  explicit_hours:
    kind: cell
    description: переопределённые часы
    content_type: explicit_hours
    size: 1+ x 1+

  lesson_kind_2h:
    kind: cell
    description: 'форма занятия: ровно 2 часа'
    content_type: lesson_kind_2h
    size: 1+ x 1+

  lesson_kind_4h:
    kind: cell
    description: 'форма занятия: ровно 4 часа'
    content_type: lesson_kind_4h
    size: 1+ x 1+

  lesson_kind_6h:
    kind: cell
    description: 'форма занятия: ровно 6 часов'
    content_type: lesson_kind_6h
    size: 1+ x 1+

  lesson_kind_2h_with_room:
    kind: cell
    description: 'форма занятия: ровно 2 часа, плюс указана аудитория'
    content_type: lesson_kind_2h_with_room
    size: 1+ x 1+
    extends: ['lesson_kind_2h', 'room']





## =================
## =================
## =================


  lesson_4h:
    description: занятие-лабораторная (ровно 4ч)
    kind: area
    extends: lesson
    size: '2+ x 6'

    inner:  # содержимое
      discipline:
        pattern: discipline_with_groups
        location:
          - top  # упаковано сверху и по бокам
          - left
          - right

      lesson_kind:
        pattern: lesson_kind_4h
        location:
          top: 1+
          # left: 0+
          # right: 0+
          bottom: 1+

      teacher:
        pattern: teacher_general
        location:
          top: 1+
          left: 0..7
          right: 0+
          bottom: 0..1

      room:
        pattern: room_general
        location:
          top: 1+
          right: 0..8
          left: 0+
          bottom: 0..3

    outer:
      week_day:
        pattern: week_day
        location: { left: '0+' }  # день недели указан слева
      week:
        pattern: week_datetime
        location: { left: '0+' }  # неделя указана слева

      hour_begin:
        pattern: hour_range
        location:
          left: 0+  # академ. часы указаны слева
          padding-top: 0
          padding-bottom: 1+
      hour_end:
        pattern: hour_range
        location:
          left: 0+  # академ. часы указаны слева
          padding-top: 1+
          padding-bottom: 0

