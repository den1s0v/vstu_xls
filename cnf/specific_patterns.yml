# specific_patterns.yml

patterns:
  # На этом уровне перечисляются паттерны грамматики.


  room_general:
    description: аудитории в любом формате
    kind: general

  teacher_general:
    description: преподаватели в любом формате
    kind: general



  room_stack:
    description: аудитории в столбик/в ряд
    kind: array
    direction: column
    item_pattern: room
    item_count: 2..3
    extends:
      - room_general

  teacher_stack:
    description: преподаватели в столбик/в ряд
    kind: array
    direction: column
    item_pattern: teacher
    item_count: 2..3
    extends:
      - teacher_general

  explicit_dates_burst:
    description: переопределённые даты в столбик/в ряд
    kind: array-in-context
    direction: fill
    item_pattern: explicit_dates
    item_count: 1..8
    gap: 0+

  room_burst:
    description: аудитории в столбик/в ряд
    kind: array-in-context
    direction: fill
    item_pattern: room
    item_count: 1..3
    gap: 0+
    # extends:
    #   - room_general

  teacher_burst:
    description: преподаватели в столбик/в ряд
    kind: array-in-context
    direction: fill
    item_pattern: teacher
    item_count: 1..3
    gap: 0+
    # extends:
    #   - teacher_general


  teacher_stack_3_unaligned:
    description: 3 преподавателя в столбик, правая граница не выровнена
    kind: area
    allows_overlapping: true
    size: '1..3 x 3'
    extends:
      - teacher_stack
    inner:  # содержимое
      m1:
        pattern: teacher
        precision_threshold: 0.5
        location: {
          top: 0, bottom: 2,
          left: 0, right: '0..1' }
      m2:
        pattern: teacher
        precision_threshold: 0.5
        location: {
          top: 1, bottom: 1,
          left: 0, right: '0..1' }
      m3:
        pattern: teacher
        precision_threshold: 0.5
        location: {
          top: 2, bottom: 0,
          left: 0, right: '0..1' }


  discipline_stack_2_unaligned:
    description: 2 дисциплины в столбик, правая граница не выровнена
    kind: area
    allows_overlapping: true
    size: '1..3 x 2'
    extends:
      - discipline_stack
    inner:  # содержимое
      m2:
        pattern: discipline_below_group
        precision_threshold: 0.5
        location: {
          top: 1, bottom: 0,
          left: 0, right: '0..0' }   # 0..1
      m1:
        pattern: discipline_below_group
        precision_threshold: 0.5
        location: {
          top: 0, bottom: 1,
          left: 0, right: '1..1' }





  explicit_dates:
    kind: cell
    description: переопределённые даты
    content_type: explicit_dates
    size: 2+ x 1

  explicit_hours:
    kind: cell
    description: переопределённые часы
    content_type: explicit_hours
    size: 1+ x 1+


  lesson_kind:
    kind: cell
    description: 'форма занятия: лек/практ/лаб'
    content_type: lesson_kind
    size: 1+ x 1+

  lesson_kind_2h:
    kind: cell
    description: 'форма занятия: ровно 2 часа'
    content_type: lesson_kind_2h
    size: 1+ x 1+

  lesson_kind_4h:
    kind: cell
    description: 'форма занятия: ровно 4 часа'
    content_type: lesson_kind_4h
    size: 1+ x 1+

  lesson_kind_6h:
    kind: cell
    description: 'форма занятия: ровно 6 часов'
    content_type: lesson_kind_6h
    size: 1+ x 1+

  lesson_kind_2h_with_room:
    kind: cell
    description: 'форма занятия: ровно 2 часа, плюс указана аудитория'
    content_type: lesson_kind_2h_with_room
    size: 1+ x 1+
    extends: ['lesson_kind_2h', 'room']


  teacher_with_room:
    kind: cell
    description: 'преподаватель и аудитория в одной ячейке'
    content_type: teacher_with_room
    size: 1+ x 1+
    extends: ['teacher', 'room']

  discipline_without_teacher:
    kind: cell
    description: 'спец. дисциплина без учителя'
    content_type: discipline_without_teacher
    size: 1+ x 1+
    extends: discipline


